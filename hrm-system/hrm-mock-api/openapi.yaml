  /users/search:
    post:
      tags: [User]
      summary: Tìm kiếm tài khoản
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/SearchRequest' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PageUser' } } } } }
  /users/{id}:
    parameters: [ { $ref: '#/components/parameters/id' } ]
    get:
      tags: [User]
      summary: Chi tiết tài khoản
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [User]
      summary: Cập nhật tài khoản
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/UserInput' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/User' } } } } }
    delete:
      tags: [User]
      summary: Xóa tài khoản
      responses: { '200': { description: OK }, '404': { $ref: '#/components/responses/NotFound' } }

  # ----------------- ROLE -----------------
  /roles:
    get:
      tags: [Role]
      summary: Danh sách vai trò (phân trang)
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/sort'
        - { name: keyword, in: query, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PageRole' } } } }
    post:
      tags: [Role]
      summary: Tạo vai trò
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RoleInput' } } } }
      responses: { '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Role' } } } } }
  /roles/{id}:
    parameters: [ { $ref: '#/components/parameters/id' } ]
    get:
      tags: [Role]
      summary: Chi tiết vai trò
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Role' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Role]
      summary: Cập nhật vai trò
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RoleInput' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Role' } } } } }
    delete:
      tags: [Role]
      summary: Xóa vai trò
      responses: { '200': { description: OK }, '404': { $ref: '#/components/responses/NotFound' } }

  # ----------------- PERMISSION -----------------
  /permissions:
    get:
      tags: [Permission]
      summary: Danh sách quyền (phân trang)
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/sort'
        - { name: keyword, in: query, schema: { type: string } }
        - { name: module, in: query, schema: { type: string } }
        - { name: action, in: query, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PagePermission' } } } }
  /permissions/{id}:
    parameters: [ { $ref: '#/components/parameters/id' } ]
    get:
      tags: [Permission]
      summary: Chi tiết quyền
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Permission' } } } }
        '404': { $ref: '#/components/responses/NotFound' }

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    id:
      name: id
      in: path
      required: true
      schema: { type: integer }
    page:
      name: page
      in: query
      description: Số trang (bắt đầu từ 0)
      schema: { type: integer, default: 0, minimum: 0 }
    size:
      name: size
      in: query
      description: Số bản ghi mỗi trang
      schema: { type: integer, default: 10, minimum: 1 }
    sort:
      name: sort
      in: query
      description: 'Sắp xếp dạng "field,(asc|desc)". Có thể lặp lại nhiều lần.'
      schema: { type: string, example: 'fullName,asc' }

  responses:
    NotFound:
      description: Không tìm thấy
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }
    Unauthorized:
      description: Chưa xác thực / token không hợp lệ
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ApiError' }

  schemas:
    # ---- Enums ----
    EmployeeStatus: { type: string, enum: [ACTIVE, PROBATION, INACTIVE, TERMINATED] }
    PositionLevel: { type: string, enum: [EXECUTIVE, DIRECTOR, MANAGER, LEAD, SENIOR, JUNIOR, INTERN] }
    AttendanceStatus: { type: string, enum: [PRESENT, LATE, EARLY_LEAVE, ABSENT, ON_LEAVE] }
    LeaveType: { type: string, enum: [ANNUAL, SICK, UNPAID, MATERNITY, MARRIAGE, BEREAVEMENT] }
    LeaveStatus: { type: string, enum: [PENDING, APPROVED, REJECTED, CANCELLED] }
    PayrollStatus: { type: string, enum: [DRAFT, APPROVED, PAID] }
    Gender: { type: string, enum: [MALE, FEMALE] }

    # ---- Entities ----
    Employee:
      type: object
      properties:
        id: { type: integer, example: 1 }
        employeeCode: { type: string, example: EMP0001 }
        fullName: { type: string, example: Nguyễn Văn An }
        gender: { $ref: '#/components/schemas/Gender' }
        dateOfBirth: { type: string, format: date }
        email: { type: string, format: email }
        phone: { type: string }
        departmentId: { type: integer }
        positionId: { type: integer }
        joinDate: { type: string, format: date }
        salary: { type: integer }
        status: { $ref: '#/components/schemas/EmployeeStatus' }
    EmployeeInput:
      type: object
      required: [fullName, departmentId, positionId]
      properties:
        employeeCode: { type: string }
        fullName: { type: string }
        gender: { $ref: '#/components/schemas/Gender' }
        dateOfBirth: { type: string, format: date }
        email: { type: string, format: email }
        phone: { type: string }
        departmentId: { type: integer }
        positionId: { type: integer }
        joinDate: { type: string, format: date }
        salary: { type: integer }
        status: { $ref: '#/components/schemas/EmployeeStatus' }

    Department:
      type: object
      properties:
        id: { type: integer }
        code: { type: string, example: HR }
        name: { type: string, example: Phòng Nhân sự }
        description: { type: string }
    DepartmentInput:
      type: object
      required: [code, name]
      properties:
        code: { type: string }
        name: { type: string }
        description: { type: string }

    Position:
      type: object
      properties:
        id: { type: integer }
        code: { type: string, example: POS01 }
        name: { type: string, example: Trưởng phòng Nhân sự }
        level: { $ref: '#/components/schemas/PositionLevel' }
    PositionInput:
      type: object
      required: [code, name, level]
      properties:
        code: { type: string }
        name: { type: string }
        level: { $ref: '#/components/schemas/PositionLevel' }

    Attendance:
      type: object
      properties:
        id: { type: integer }
        employeeId: { type: integer }
        workDate: { type: string, format: date }
        checkIn: { type: string, nullable: true, example: '08:30' }
        checkOut: { type: string, nullable: true, example: '17:45' }
        workingHours: { type: number, format: float }
        status: { $ref: '#/components/schemas/AttendanceStatus' }
    AttendanceInput:
      type: object
      required: [employeeId, workDate, status]
      properties:
        employeeId: { type: integer }
        workDate: { type: string, format: date }
        checkIn: { type: string, nullable: true }
        checkOut: { type: string, nullable: true }
        workingHours: { type: number, format: float }
        status: { $ref: '#/components/schemas/AttendanceStatus' }

    LeaveRequest:
      type: object
      properties:
        id: { type: integer }
        employeeId: { type: integer }
        leaveType: { $ref: '#/components/schemas/LeaveType' }
        fromDate: { type: string, format: date }
        toDate: { type: string, format: date }
        totalDays: { type: integer }
        reason: { type: string }
        status: { $ref: '#/components/schemas/LeaveStatus' }
        approvedBy: { type: integer, nullable: true }
    LeaveRequestInput:
      type: object
      required: [employeeId, leaveType, fromDate, toDate]
      properties:
        employeeId: { type: integer }
        leaveType: { $ref: '#/components/schemas/LeaveType' }
        fromDate: { type: string, format: date }
        toDate: { type: string, format: date }
        totalDays: { type: integer }
        reason: { type: string }
        status: { $ref: '#/components/schemas/LeaveStatus' }
        approvedBy: { type: integer, nullable: true }

    Payroll:
      type: object
      properties:
        id: { type: integer }
        employeeId: { type: integer }
        period: { type: string, example: '2026-06' }
        baseSalary: { type: integer }
        allowance: { type: integer }
        bonus: { type: integer }
        insurance: { type: integer }
        tax: { type: integer }
        deduction: { type: integer }
        netSalary: { type: integer }
        status: { $ref: '#/components/schemas/PayrollStatus' }
    PayrollInput:
      type: object
      required: [employeeId, period, baseSalary]
      properties:
        employeeId: { type: integer }
        period: { type: string }
        baseSalary: { type: integer }
        allowance: { type: integer }
        bonus: { type: integer }
        insurance: { type: integer }
        tax: { type: integer }
        deduction: { type: integer }
        netSalary: { type: integer }
        status: { $ref: '#/components/schemas/PayrollStatus' }

    User:
      type: object
      properties:
        id: { type: integer }
        username: { type: string }
        employeeId: { type: integer }
        email: { type: string, format: email }
        roleId: { type: integer }
        enabled: { type: boolean }
        lastLoginAt: { type: string, format: date-time, nullable: true }
    UserInput:
      type: object
      required: [username, roleId]
      properties:
        username: { type: string }
        password: { type: string, format: password }
        employeeId: { type: integer }
        email: { type: string, format: email }
        roleId: { type: integer }
        enabled: { type: boolean }

    Role:
      type: object
      properties:
        id: { type: integer }
        code: { type: string }
        name: { type: string }
        description: { type: string }
        permissionIds: { type: array, items: { type: integer } }
    RoleInput:
      type: object
      required: [code, name]
      properties:
        code: { type: string }
        name: { type: string }
        description: { type: string }
        permissionIds: { type: array, items: { type: integer } }

    Permission:
      type: object
      properties:
        id: { type: integer }
        code: { type: string, example: EMPLOYEE_VIEW }
        name: { type: string }
        module: { type: string, example: employee }
        action: { type: string, enum: [VIEW, CREATE, UPDATE, DELETE] }

    # ---- Search requests ----
    SearchRequest:
      type: object
      description: Yêu cầu tìm kiếm chung
      properties:
        keyword: { type: string }
        page: { type: integer, default: 0 }
        size: { type: integer, default: 10 }
        sort: { type: string, example: 'id,desc' }
    EmployeeSearchRequest:
      allOf:
        - $ref: '#/components/schemas/SearchRequest'
        - type: object
          properties:
            departmentId: { type: integer }
            positionId: { type: integer }
            status: { $ref: '#/components/schemas/EmployeeStatus' }
            salary_gte: { type: integer }
            salary_lte: { type: integer }
    AttendanceSearchRequest:
      allOf:
        - $ref: '#/components/schemas/SearchRequest'
        - type: object
          properties:
            employeeId: { type: integer }
            status: { $ref: '#/components/schemas/AttendanceStatus' }
            workDate_gte: { type: string, format: date }
            workDate_lte: { type: string, format: date }

    # ---- Page wrappers (Spring Data) ----
    SortInfo:
      type: object
      properties:
        empty: { type: boolean }
        sorted: { type: boolean }
        unsorted: { type: boolean }
    Pageable:
      type: object
      properties:
        pageNumber: { type: integer }
        pageSize: { type: integer }
        offset: { type: integer }
        paged: { type: boolean }
        unpaged: { type: boolean }
        sort: { $ref: '#/components/schemas/SortInfo' }
    PageMeta:
      type: object
      properties:
        pageable: { $ref: '#/components/schemas/Pageable' }
        totalElements: { type: integer }
        totalPages: { type: integer }
        number: { type: integer }
        size: { type: integer }
        numberOfElements: { type: integer }
        first: { type: boolean }
        last: { type: boolean }
        empty: { type: boolean }
        sort: { $ref: '#/components/schemas/SortInfo' }

    PageEmployee:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties: { content: { type: array, items: { $ref: '#/components/schemas/Employee' } } }
    PageDepartment:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties: { content: { type: array, items: { $ref: '#/components/schemas/Department' } } }
    PagePosition:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties: { content: { type: array, items: { $ref: '#/components/schemas/Position' } } }
    PageAttendance:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties: { content: { type: array, items: { $ref: '#/components/schemas/Attendance' } } }
    PageLeaveRequest:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties: { content: { type: array, items: { $ref: '#/components/schemas/LeaveRequest' } } }
    PagePayroll:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties: { content: { type: array, items: { $ref: '#/components/schemas/Payroll' } } }
    PageUser:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties: { content: { type: array, items: { $ref: '#/components/schemas/User' } } }
    PageRole:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties: { content: { type: array, items: { $ref: '#/components/schemas/Role' } } }
    PagePermission:
      allOf:
        - $ref: '#/components/schemas/PageMeta'
        - type: object
          properties: { content: { type: array, items: { $ref: '#/components/schemas/Permission' } } }

    ApiError:
      type: object
      properties:
        timestamp: { type: string, format: date-time }
        status: { type: integer, example: 404 }
        error: { type: string, example: Not Found }
        message: { type: string }
        path: { type: string }

    # ---- Auth ----
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string, example: emp0002 }
        password: { type: string, format: password, example: '123456' }
    LoginResponse:
      type: object
      properties:
        accessToken: { type: string, example: mockjwt.eyJzdWIiOjIsInVzZXJuYW1lIjoiZW1wMDAwMiJ9 }
        tokenType: { type: string, example: Bearer }
        expiresIn: { type: integer, example: 3600 }
        user: { $ref: '#/components/schemas/AuthUser' }
    AuthUser:
      type: object
      description: Tài khoản kèm vai trò, danh sách quyền và hồ sơ nhân viên (đã ẩn passwordHash)
      properties:
        id: { type: integer }
        username: { type: string }
        employeeId: { type: integer }
        email: { type: string, format: email }
        roleId: { type: integer }
        enabled: { type: boolean }
        lastLoginAt: { type: string, format: date-time, nullable: true }
        role:
          type: object
          properties:
            id: { type: integer }
            code: { type: string, example: HR_MANAGER }
            name: { type: string }
        permissions:
          type: array
          items: { type: string, example: EMPLOYEE_VIEW }
        employee: { $ref: '#/components/schemas/Employee' }
