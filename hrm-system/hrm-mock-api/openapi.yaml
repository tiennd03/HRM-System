openapi: 3.0.3
info:
  title: HRM System API
  description: >-
    API quản lý nhân sự (HRM). Mock bằng JSON Server, mô phỏng backend Java Spring Boot
    (Spring Data Page, search/filter/sort). Các endpoint danh sách trả về `Page<T>`.
  version: 1.0.0
  contact:
    name: HRM Team
servers:
  - url: http://localhost:3001/api/v1
    description: Mock server (local)

tags:
  - name: Auth
  - name: Employee
  - name: Department
  - name: Position
  - name: Attendance
  - name: LeaveRequest
  - name: Payroll
  - name: User
  - name: Role
  - name: Permission

paths:
  # ----------------- AUTH -----------------
  /auth/login:
    post:
      tags: [Auth]
      summary: Đăng nhập
      description: 'Mock: mọi tài khoản dùng mật khẩu `123456`. Username = mã nhân viên viết thường (vd `emp0002`).'
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: Đăng nhập thành công
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LoginResponse' }
        '401': { description: Sai tài khoản hoặc mật khẩu, content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' } } } }
        '403': { description: Tài khoản bị khóa, content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' } } } }
  /auth/logout:
    post:
      tags: [Auth]
      summary: Đăng xuất
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties: { message: { type: string, example: Đăng xuất thành công } }
  /auth/profile:
    get:
      tags: [Auth]
      summary: Thông tin tài khoản đang đăng nhập
      description: 'Yêu cầu header `Authorization: Bearer <token>`.'
      security: [ { bearerAuth: [] } ]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthUser' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  # ----------------- EMPLOYEE -----------------
  /employees:
    get:
      tags: [Employee]
      summary: Danh sách nhân viên (phân trang)
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/sort'
        - { name: keyword, in: query, schema: { type: string }, description: Tìm theo mã/tên/email/SĐT }
        - { name: departmentId, in: query, schema: { type: integer } }
        - { name: positionId, in: query, schema: { type: integer } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/EmployeeStatus' } }
        - { name: salary_gte, in: query, schema: { type: integer }, description: Lương tối thiểu }
        - { name: salary_lte, in: query, schema: { type: integer }, description: Lương tối đa }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PageEmployee' }
    post:
      tags: [Employee]
      summary: Tạo nhân viên
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmployeeInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Employee' }
  /employees/search:
    post:
      tags: [Employee]
      summary: Tìm kiếm nâng cao nhân viên
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EmployeeSearchRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PageEmployee' }
  /employees/{id}:
    parameters:
      - $ref: '#/components/parameters/id'
    get:
      tags: [Employee]
      summary: Chi tiết nhân viên
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Employee' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Employee]
      summary: Cập nhật nhân viên
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/EmployeeInput' } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Employee' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      tags: [Employee]
      summary: Cập nhật một phần nhân viên
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/EmployeeInput' } } } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Employee' } } } }
    delete:
      tags: [Employee]
      summary: Xóa nhân viên
      responses:
        '200': { description: OK }
        '404': { $ref: '#/components/responses/NotFound' }

  # ----------------- DEPARTMENT -----------------
  /departments:
    get:
      tags: [Department]
      summary: Danh sách phòng ban (phân trang)
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/sort'
        - { name: keyword, in: query, schema: { type: string } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PageDepartment' } } } }
    post:
      tags: [Department]
      summary: Tạo phòng ban
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/DepartmentInput' } } } }
      responses: { '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Department' } } } } }
  /departments/search:
    post:
      tags: [Department]
      summary: Tìm kiếm phòng ban
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/SearchRequest' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PageDepartment' } } } } }
  /departments/{id}:
    parameters: [ { $ref: '#/components/parameters/id' } ]
    get:
      tags: [Department]
      summary: Chi tiết phòng ban
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Department' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Department]
      summary: Cập nhật phòng ban
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/DepartmentInput' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Department' } } } } }
    delete:
      tags: [Department]
      summary: Xóa phòng ban
      responses: { '200': { description: OK }, '404': { $ref: '#/components/responses/NotFound' } }

  # ----------------- POSITION -----------------
  /positions:
    get:
      tags: [Position]
      summary: Danh sách chức danh (phân trang)
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/sort'
        - { name: keyword, in: query, schema: { type: string } }
        - { name: level, in: query, schema: { $ref: '#/components/schemas/PositionLevel' } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PagePosition' } } } }
    post:
      tags: [Position]
      summary: Tạo chức danh
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/PositionInput' } } } }
      responses: { '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Position' } } } } }
  /positions/search:
    post:
      tags: [Position]
      summary: Tìm kiếm chức danh
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/SearchRequest' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PagePosition' } } } } }
  /positions/{id}:
    parameters: [ { $ref: '#/components/parameters/id' } ]
    get:
      tags: [Position]
      summary: Chi tiết chức danh
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Position' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Position]
      summary: Cập nhật chức danh
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/PositionInput' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Position' } } } } }
    delete:
      tags: [Position]
      summary: Xóa chức danh
      responses: { '200': { description: OK }, '404': { $ref: '#/components/responses/NotFound' } }

  # ----------------- ATTENDANCE -----------------
  /attendances:
    get:
      tags: [Attendance]
      summary: Danh sách chấm công (phân trang)
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/sort'
        - { name: employeeId, in: query, schema: { type: integer } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/AttendanceStatus' } }
        - { name: workDate_gte, in: query, schema: { type: string, format: date } }
        - { name: workDate_lte, in: query, schema: { type: string, format: date } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PageAttendance' } } } }
    post:
      tags: [Attendance]
      summary: Tạo bản ghi chấm công
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AttendanceInput' } } } }
      responses: { '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Attendance' } } } } }
  /attendances/search:
    post:
      tags: [Attendance]
      summary: Tìm kiếm chấm công
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AttendanceSearchRequest' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PageAttendance' } } } } }
  /attendances/{id}:
    parameters: [ { $ref: '#/components/parameters/id' } ]
    get:
      tags: [Attendance]
      summary: Chi tiết chấm công
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Attendance' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Attendance]
      summary: Cập nhật chấm công
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AttendanceInput' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Attendance' } } } } }
    delete:
      tags: [Attendance]
      summary: Xóa chấm công
      responses: { '200': { description: OK }, '404': { $ref: '#/components/responses/NotFound' } }

  # ----------------- LEAVE REQUEST -----------------
  /leaveRequests:
    get:
      tags: [LeaveRequest]
      summary: Danh sách đơn nghỉ phép (phân trang)
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/sort'
        - { name: employeeId, in: query, schema: { type: integer } }
        - { name: leaveType, in: query, schema: { $ref: '#/components/schemas/LeaveType' } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/LeaveStatus' } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PageLeaveRequest' } } } }
    post:
      tags: [LeaveRequest]
      summary: Tạo đơn nghỉ phép
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/LeaveRequestInput' } } } }
      responses: { '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/LeaveRequest' } } } } }
  /leaveRequests/search:
    post:
      tags: [LeaveRequest]
      summary: Tìm kiếm đơn nghỉ phép
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/SearchRequest' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PageLeaveRequest' } } } } }
  /leaveRequests/{id}:
    parameters: [ { $ref: '#/components/parameters/id' } ]
    get:
      tags: [LeaveRequest]
      summary: Chi tiết đơn nghỉ phép
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/LeaveRequest' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [LeaveRequest]
      summary: Cập nhật đơn nghỉ phép
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/LeaveRequestInput' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/LeaveRequest' } } } } }
    delete:
      tags: [LeaveRequest]
      summary: Xóa đơn nghỉ phép
      responses: { '200': { description: OK }, '404': { $ref: '#/components/responses/NotFound' } }

  # ----------------- PAYROLL -----------------
  /payrolls:
    get:
      tags: [Payroll]
      summary: Danh sách bảng lương (phân trang)
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/sort'
        - { name: employeeId, in: query, schema: { type: integer } }
        - { name: period, in: query, schema: { type: string, example: '2026-06' } }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/PayrollStatus' } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PagePayroll' } } } }
    post:
      tags: [Payroll]
      summary: Tạo bảng lương
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/PayrollInput' } } } }
      responses: { '201': { description: Created, content: { application/json: { schema: { $ref: '#/components/schemas/Payroll' } } } } }
  /payrolls/search:
    post:
      tags: [Payroll]
      summary: Tìm kiếm bảng lương
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/SearchRequest' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PagePayroll' } } } } }
  /payrolls/{id}:
    parameters: [ { $ref: '#/components/parameters/id' } ]
    get:
      tags: [Payroll]
      summary: Chi tiết bảng lương
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Payroll' } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      tags: [Payroll]
      summary: Cập nhật bảng lương
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/PayrollInput' } } } }
      responses: { '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/Payroll' } } } } }
    delete:
      tags: [Payroll]
      summary: Xóa bảng lương
      responses: { '200': { description: OK }, '404': { $ref: '#/components/responses/NotFound' } }

  # ----------------- USER -----------------
  /users:
    get:
      tags: [User]
      summary: Danh sách tài khoản (phân trang)
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/size'
        - $ref: '#/components/parameters/sort'
        - { name: keyword, in: query, schema: { type: string } }
        - { name: roleId, in: query, schema: { type: integer } }
        - { name: enabled, in: query, schema: { type: boolean } }
      responses:
        '200': { description: OK, content: { application/json: { schema: { $ref: '#/components/schemas/PageUser' } } } }
    post:
      tags: [User]
      summary: Tạo tài khoản
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/UserInput' } } } }
